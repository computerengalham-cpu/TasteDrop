<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Menu - TasteDrop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <!-- fontawsome style-->
    <link rel="stylesheet" href="./css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- Menu CSS -->
    <link rel="stylesheet" href="./css/menu.css">

</head>

<body>

    <!-- 🔷 Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-utensils" style="color: rgb(255, 255, 255);"></i>TasteDrop</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link " href="./index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="./menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>

                <!-- Cart -->
                <a href="./cart.html" class="ms-3 position-relative text-white">
                    <i class="fa-solid fa-cart-plus"></i>
                    <span id="cart-count" class="badge bg-danger">0</span>
                </a>

                <!-- Dark Mode -->
                <button onclick="toggleDark()" class="theme-toggle ms-3">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <!--  Search + Sort -->
        <div class="row mb-3">
            <div class="col-md-6">
                <input type="text" id="search" class="form-control" placeholder="Search food...">
            </div>
            <div class="col-md-6">
                <select id="sort" class="form-select">
                    <option value="">Sort</option>
                    <option value="low">Price Low → High</option>
                    <option value="high">Price High → Low</option>
                </select>
            </div>
        </div>

        <!-- Categories -->
        <div class="mb-3 text-center">
            <button class="btn btn-outline-primary m-1" onclick="filterCategory('All')">All</button>
            <button class="btn btn-outline-primary m-1" onclick="filterCategory('Burgers')">Burgers</button>
            <button class="btn btn-outline-primary m-1" onclick="filterCategory('Pizza')">Pizza</button>
            <button class="btn btn-outline-primary m-1" onclick="filterCategory('Main Course')">Main</button>
            <button class="btn btn-outline-primary m-1" onclick="filterCategory('Desserts')">Desserts</button>
            <button class="btn btn-outline-primary m-1" onclick="filterCategory('Drinks')">Drinks</button>
        </div>

        <!--  Menu Items -->
        <div id="menu-items" class="row"></div>

    </div>


    <!-- bootstrap js -->
    <script src="./js/bootstrap.bundle.min.js"></script>

    <!-- fontawsome js -->
    <script src="./js/all.min.js"></script>

    <!-- JS -->
    <script src="./js/menu.js"></script>
</body>

</html>
