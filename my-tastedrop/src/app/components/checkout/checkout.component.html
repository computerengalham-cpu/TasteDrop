<div class="container mt-5 py-5">
  <div class="row g-5">
    <div class="col-md-7">
      <h4 class="mb-4 fw-bold text-warning"><i class="fa-solid fa-truck-fast me-2"></i>Shipping & Payment</h4>
      <form (ngSubmit)="submitOrder()" #checkoutForm="ngForm">
        <div class="row g-3 mb-4">
          <div class="col-12">
            <label class="form-label fw-bold">Full Name</label>
            <input type="text" class="form-control shadow-sm" name="fullName" [(ngModel)]="orderData.fullName" required placeholder="Enter your name">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Email</label>
            <input type="email" class="form-control shadow-sm" name="email" [(ngModel)]="orderData.email" required placeholder="nn@example.com">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">City</label>
            <input type="text" class="form-control shadow-sm" name="city" [(ngModel)]="orderData.city" required>
          </div>
          <div class="col-12">
            <label class="form-label fw-bold">Address Details</label>
            <textarea class="form-control shadow-sm" name="address" [(ngModel)]="orderData.address" rows="3" required></textarea>
          </div>
        </div>

        <h4 class="mb-3 fw-bold">Payment Method</h4>
        <div class="my-3 p-3 rounded-3 bg-light border">
          <div class="form-check form-check-inline me-4">
            <input name="paymentMethod" type="radio" class="form-check-input" value="card" [(ngModel)]="orderData.paymentMethod">
            <label class="form-check-label fw-bold text-dark">Credit Card</label>
          </div>
          <div class="form-check form-check-inline">
            <input name="paymentMethod" type="radio" class="form-check-input" value="cash" [(ngModel)]="orderData.paymentMethod">
            <label class="form-check-label fw-bold text-dark">Cash on Delivery</label>
          </div>
        </div>

        <div class="row gy-3 mt-2 p-3 rounded-3 border bg-white" *ngIf="orderData.paymentMethod === 'card'">
          <div class="col-12">
            <label class="form-label fw-bold text-dark">Card Number</label>
            <input type="text" class="form-control" name="cardNumber" [(ngModel)]="orderData.cardNumber" placeholder="0000 0000 0000 0000">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold text-dark">Expiry Date</label>
            <input type="text" class="form-control" name="expiry" [(ngModel)]="orderData.expiry" placeholder="MM/YY">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold text-dark">CVV</label>
            <input type="text" class="form-control" name="cvv" [(ngModel)]="orderData.cvv">
          </div>
        </div>

        <button class="w-100 btn btn-success btn-lg mt-5 fw-bold rounded-pill shadow" type="submit" [disabled]="!checkoutForm.valid">
          Place Order ({{ totalAmount | number:'1.3-3' }} OMR)
        </button>
      </form>
    </div>

    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
        <div class="card-header bg-warning py-3"><h5 class="mb-0 fw-bold text-dark">Order Summary</h5></div>
        <div class="card-body p-4 bg-white">
          <ul class="list-group list-group-flush">
            <li *ngFor="let item of cartService.getItems()" class="list-group-item d-flex justify-content-between border-0 px-0">
              <div><h6 class="my-0 fw-bold text-dark">{{ item.name }}</h6><small class="text-muted">Qty: {{ item.quantity }}</small></div>
              <span class="fw-bold text-dark">{{ (item.price * item.quantity) | number:'1.3-3' }} OMR</span>
            </li>
            <li class="list-group-item d-flex justify-content-between px-0 mt-3 pt-3 border-top border-2">
              <span class="h5 fw-bold text-dark">Total Amount</span>
              <strong class="h5 fw-bold text-success">{{ totalAmount | number:'1.3-3' }} OMR</strong>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
