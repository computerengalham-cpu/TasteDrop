<div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden position-relative transition-hover">
  
  <div *ngIf="!item.available" class="position-absolute top-0 start-0 w-100 h-100 bg-white bg-opacity-75 d-flex align-items-center justify-content-center" style="z-index: 2;">
    <span class="badge bg-danger fs-6 p-2 px-3 shadow rounded-pill">Out of Stock</span>
  </div>
<img 
  [src]="item.image" 
  alt="{{ item.name }}"
  class="w-100"
  style="height:180px; object-fit:cover;"
/>
  <div class="card-body d-flex flex-column p-4">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <div [ngSwitch]="item.category">
        <span *ngSwitchCase="'Pizza'" class="badge bg-danger rounded-pill"><i class="fa-solid fa-pizza-slice" style="color: rgb(255, 212, 59);"></i> Pizza</span>
        <span *ngSwitchCase="'Burgers'" class="badge bg-warning text-dark rounded-pill"><i class="fa-solid fa-burger" style="color: rgb(28, 28, 27);"></i> Burgers</span>
        <span *ngSwitchCase="'Desserts'" class="badge bg-info text-dark rounded-pill"><i class="fa-solid fa-cookie-bite" style="color: rgb(200, 130, 52);"></i> Desserts</span>
        <span *ngSwitchDefault class="badge bg-secondary rounded-pill">{{item.category}}</span>
      </div>
      <div class="text-warning small">
        <i class="fa-solid fa-star"></i> {{item.rating}}
      </div>
    </div>

    <h5 class="card-title fw-bold text-dark">{{ item.name }}</h5>
    <p class="card-text text-muted small flex-grow-1">{{ item.description }}</p>

    <div class="mt-3">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="fw-bold text-success fs-5">{{ item.price | number:'1.3-3' }} OMR</span>
      </div>

      <button 
        (click)="handleAdd()" 
        [disabled]="!item.available"
        class="btn btn-success w-100 py-2 fw-bold shadow-sm rounded-3">
        <i class="fa-solid fa-plus me-2"></i> Add to Cart
      </button>
    </div>
  </div>
</div>
